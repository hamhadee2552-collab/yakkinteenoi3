<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="utf-8">

<title>🌸 PM2.5  </title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(120deg,#ffe0ec,#ffd6e7);
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#d63384;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:20px;
}

.cards-bottom{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.value{
font-size:40px;
color:#d63384;
font-weight:bold;
}

.chart-box{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>


</head>

<body>

<div class="container">

<h1>
PM2.5 PROJECT COLLABORATION
<br>
<span class="thai">
Real-time PM2.5 Monitoring System
<br>
<span class="thai">
Princess Chulabhorn Science High School Mukdahan
</span>
</span>
</h1>


<div class="cards">

<div class="card">
Library
<div id="phys" class="value">-</div>
</div>

<div class="card">
Student Council Room
<div id="council" class="value">-</div>
</div>

<div class="card">
STEM Room
<div id="stem" class="value">-</div>
</div>

</div>

<div class="cards-bottom">

<div class="card">
Canteen
<div id="canteen" class="value">-</div>
</div>

<div class="card">
Female Dormitory
<div id="astro" class="value">-</div>
</div>

</div>

<div class="chart-box">

<canvas id="chart"></canvas>

</div>

</div>

<script>

/* ================= Sheet IDs ================= */

const SHEETS={

phys:"1COK9ynPaA6uaogMMlnQoTZ8SgiliCrqipJOfJHYgQVw",

council:"14YBXIcFCx9bq8Jpn-wnGlBX_87Yg8_gqTDWZxQNPMEA",

stem:"1XJiZsuLS1YYINWZRkOSrNfDSAwNj0jO0eZX2kboQfks",

canteen:"1MDbX9wnS8tVfMUwnsQVqvijCdaRh_QO8PjYa4q3nMs8",

astro:"14MnFUZLcxwUfZ8oAein2DVoTnHDzvrDeCQHl36-Enuw"

};

let chart;

let currentSlot=null;

let labels=[];

let buffer={

phys:new Array(10).fill(null),
council:new Array(10).fill(null),
stem:new Array(10).fill(null),
canteen:new Array(10).fill(null),
astro:new Array(10).fill(null)

};


/* ================= Labels ================= */

function generateLabels(){

const now=new Date();
const start=Math.floor(now.getMinutes()/20)*20;
const hour=now.getHours();

labels=[];

for(let i=0;i<10;i++){

labels.push(
hour.toString().padStart(2,'0')
+":"
+(start+(i*2)).toString().padStart(2,'0')
);

}

}


/* ================= Get Data ================= */

async function getLatest(sheet){

const url=`https://docs.google.com/spreadsheets/d/${sheet}/gviz/tq?tqx=out:json`;

const res=await fetch(url);

const txt=await res.text();

const json=JSON.parse(txt.substr(47).slice(0,-2));

return json.table.rows.at(-1).c[2].v;

}


/* ================= Load Data ================= */

async function loadData(){

const now=new Date();

const minute=now.getMinutes();

const slot=Math.floor(minute/20);


if(currentSlot===null){

currentSlot=slot;

generateLabels();

initChart();

}


if(slot!==currentSlot){

currentSlot=slot;

buffer={

phys:new Array(10).fill(null),
council:new Array(10).fill(null),
stem:new Array(10).fill(null),
canteen:new Array(10).fill(null),
astro:new Array(10).fill(null)

};

generateLabels();

chart.data.labels=labels;

}


const start=Math.floor(minute/20)*20;

const index=minute-start;


const phys=await getLatest(SHEETS.phys);
const council=await getLatest(SHEETS.council);
const stem=await getLatest(SHEETS.stem);
const canteen=await getLatest(SHEETS.canteen);
const astro=await getLatest(SHEETS.astro);


document.getElementById("phys").innerText=phys;
document.getElementById("council").innerText=council;
document.getElementById("stem").innerText=stem;
document.getElementById("canteen").innerText=canteen;
document.getElementById("astro").innerText=astro;


buffer.phys[index]=phys;
buffer.council[index]=council;
buffer.stem[index]=stem;
buffer.canteen[index]=canteen;
buffer.astro[index]=astro;


chart.data.datasets[0].data=buffer.phys;
chart.data.datasets[1].data=buffer.council;
chart.data.datasets[2].data=buffer.stem;
chart.data.datasets[3].data=buffer.canteen;
chart.data.datasets[4].data=buffer.astro;

chart.update();

}


/* ================= Chart ================= */

function initChart(){

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{

labels:labels,

datasets:[

{label:"Library",data:buffer.phys,borderColor:"#ff4d6d",tension:0.4},

{label:"Student Council Room",data:buffer.council,borderColor:"#4361ee",tension:0.4},

{label:"STEM Room",data:buffer.stem,borderColor:"#06d6a0",tension:0.4},

{label:"Canteen",data:buffer.canteen,borderColor:"#f8961e",tension:0.4},

{label:"Female Dormitory",data:buffer.astro,borderColor:"#7209b7",tension:0.4}

]

},

options:{

responsive:true,

animation:false,

scales:{

y:{

min:0,
max:50,

ticks:{
stepSize:5
},

title:{
display:true,
text:"PM2.5 (µg/m³)"
}

},

x:{
title:{
display:true,
text:"20-minute interval"
}
}

}

}

});

}


/* ================= Start ================= */

loadData();

setInterval(loadData,60000);

</script>

</body>

</html>
